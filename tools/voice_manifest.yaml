metadata:
  project: MathAdventure
  version: '1.0'
common:
- audio_id: common_perfect_clear
  text: 完美通关！
  role: announce
- audio_id: common_great_clear
  text: 闯关成功！
  role: announce
- audio_id: common_barely_clear
  text: 勉强通过！
  role: announce
- audio_id: common_well_done
  text: 你完成得很棒！
  role: cheer
- audio_id: common_correct
  text: 答对了！
  role: cheer
- audio_id: common_great
  text: 太棒了！
  role: cheer
- audio_id: common_try_again
  text: 再想想哦！
  role: guide
- audio_id: common_wrong
  text: 不对哦，再试一次！
  role: guide
- audio_id: common_welcome
  text: 准备好了吗？开始冒险吧！
  role: guide
- audio_id: common_exit
  text: 返回地图
  role: guide
- audio_id: common_restart
  text: 再玩一次
  role: guide
- audio_id: common_next
  text: 下一关
  role: guide
g1_up:
- audio_id: g1_u1_guide_init
  text: 我们要先找 1 哦！
  role: guide
- audio_id: g1_u1_guide_welcome
  text: 欢迎来到数字谷！先找出 1 个物品的小组哦！
  role: guide
- audio_id: g1_u1_guide_fill
  text: 太棒了！10 个数字槽都填满啦！接下来去友谊桥看看吧。
  role: guide
- audio_id: g1_u1_guide_bridge
  text: 来到友谊桥啦！把左边的兔子和右边的兔子连线配对吧！
  role: guide
- audio_id: g1_u1_guide_compare
  text: 看！有的连上了，有的没连上。哪边多呢？
  role: guide
- audio_id: g1_u1_guide_result
  text: 完全正确！左边多出 2 只没对手，5 只比 3 只多！
  role: guide
- audio_id: g1_u1_guide_next2
  text: 真准！接下来找出 2 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next3
  text: 真准！接下来找出 3 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next4
  text: 真准！接下来找出 4 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next5
  text: 真准！接下来找出 5 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next6
  text: 真准！接下来找出 6 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next7
  text: 真准！接下来找出 7 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next8
  text: 真准！接下来找出 8 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next9
  text: 真准！接下来找出 9 个物品的小组。
  role: guide
- audio_id: g1_u1_guide_next10
  text: 真准！接下来找出 10 个物品的小组。
  role: guide
- audio_id: g1_u1_settlement_title
  text: 数一数冠军！
  role: announce
- audio_id: g1_u1_settlement_subtitle
  text: 你对 1~10 的数序和多少关系非常熟悉！
  role: guide
- audio_id: g1_u1_error_bridge
  text: 再看看哪边还有兔子没连上线？
  role: guide
- audio_id: g1_u2_guide_init
  text: 空间小飞侠出发！
  role: guide
- audio_id: g1_u2_settlement_title
  text: 空间感知大师！
  role: announce
- audio_id: g1_u2_settlement_subtitle
  text: 你已经掌握了上下、前后、左右的位置关系。
  role: announce
- audio_id: g1_u3_guide_init
  text: 果园数学家来啦！
  role: guide
- audio_id: g1_u3_guide_step1
  text: 数一数有几个水果？点击正确的数字吧！
  role: guide
- audio_id: g1_u3_settlement_title
  text: 果园数学家！
  role: announce
- audio_id: g1_u3_settlement_subtitle
  text: 你已经认识了 1 到 5 的数字，学会了简单的加减和比大小。
  role: announce
- audio_id: g1_u4_guide_init
  text: 图形龟的山洞仓库
  role: guide
- audio_id: g1_u4_guide_step1
  text: 拖动物品放入正确的位置，把物品拖入对应的形状框内吧！
  role: guide
- audio_id: g1_u4_guide_step2
  text: 盲摸挑战：根据描述点选出正确的图形！
  role: guide
- audio_id: g1_u4_desc_cube
  text: 它到处平平的、方方的，每个面都一样大。
  role: guide
- audio_id: g1_u4_desc_cuboid
  text: 它长长的、方方的，有 6 个平平的面。
  role: guide
- audio_id: g1_u4_desc_cylinder
  text: 它直直的，上下两个圆圆的面一样大，横着能滚动。
  role: guide
- audio_id: g1_u4_desc_sphere
  text: 它圆圆的，没有平平的面，可以到处滚动。
  role: guide
- audio_id: g1_u4_settlement_title
  text: 形状探险完成！
  role: announce
- audio_id: g1_u4_settlement_subtitle
  text: 你已经掌握了各种立体图形的特征。
  role: announce
- audio_id: g1_u5_guide_init
  text: 一图四式大揭秘！
  role: guide
- audio_id: g1_u5_guide_step1
  text: 观察花朵，拖动数字放入正确的位置，填满这四个神奇的算式吧！
  role: guide
- audio_id: g1_u5_guide_step2
  text: 连加过山车出发了！
  role: guide
- audio_id: g1_u5_settlement_title
  text: 运算大师！
  role: announce
- audio_id: g1_u5_settlement_subtitle
  text: 你已经掌握了 6 到 10 的组成与连加技巧。
  role: announce
- audio_id: g1_u6_guide_init
  text: 欢迎来到数位城堡！
  role: guide
- audio_id: g1_u6_guide_step1
  text: 十个珠子可以捆成一串。请圈出 10 颗珍珠打包吧！
  role: guide
- audio_id: g1_u6_guide_step2
  text: 瞧！一个十和两个一，合起来是多少？请在下方填入数位。
  role: guide
- audio_id: g1_u6_guide_step3
  text: 十五和十二谁更大？先比十位，十位相同再比个位！
  role: guide
- audio_id: g1_u6_settlement_title
  text: 数位勇士！
  role: announce
- audio_id: g1_u6_settlement_subtitle
  text: 你已经掌握了 11 到 20 数位的秘密。
  role: announce
- audio_id: g1_u7_guide_init
  text: 时间小鸟的钟楼
  role: guide
- audio_id: g1_u7_task_1
  text: 7 时了，该起床了！
  role: guide
- audio_id: g1_u7_task_2
  text: 3 时半，快来吃午点吧！
  role: guide
- audio_id: g1_u7_task_3
  text: 10 时整，该去做早操啦！
  role: guide
- audio_id: g1_u7_task_4
  text: 8 时半，准备上床睡觉咯！
  role: guide
- audio_id: g1_u7_settlement_title
  text: 时间守护者！
  role: announce
- audio_id: g1_u7_settlement_subtitle
  text: 你已经学会了看整时和半时。
  role: announce
- audio_id: g1_u8_guide_init
  text: 神奇的凑十法实验室
  role: guide
- audio_id: g1_u8_settlement_title
  text: 凑十法大师！
  role: announce
- audio_id: g1_u8_settlement_subtitle
  text: 你已经完美攻克了 20 以内的进位加法。
  role: announce
g1_down:
- audio_id: g1_d_u1_guide_title
  text: 图形寻宝——把物品拖进正确的图形框！
  role: guide
- audio_id: g1_d_u1_guide_step1
  text: 拖动物品放入正确的位置，把下面的物品拖到正确的图形框里吧！
  role: guide
- audio_id: g1_d_u1_guide_step2
  text: 考考你：这个图形叫什么名字？
  role: guide
- audio_id: g1_d_u1_guide_step2_title
  text: 这是什么图形？
  role: guide
- audio_id: g1_d_u1_desc_rect1
  text: 四条边，对边相等，四个直角
  role: guide
- audio_id: g1_d_u1_desc_square1
  text: 四条边都一样长，四个直角
  role: guide
- audio_id: g1_d_u1_desc_para
  text: 四条边，对边平行且相等，没有直角
  role: guide
- audio_id: g1_d_u1_desc_tri
  text: 三条边，三个角
  role: guide
- audio_id: g1_d_u1_desc_circle
  text: 没有角，到处圆圆的
  role: guide
- audio_id: g1_d_u1_desc_rect2
  text: 它长长的，上下两条边一样长
  role: guide
- audio_id: g1_d_u1_desc_square2
  text: 它方方正正，四条边一样长
  role: guide
- audio_id: g1_d_u1_desc_tri2
  text: 它像一座小山，有三条边
  role: guide
- audio_id: g1_d_u1_settlement_subtitle_1
  text: 你认识了所有的平面图形！
  role: announce
- audio_id: g1_d_u1_settlement_subtitle_2
  text: 你掌握了大部分平面图形！
  role: announce
- audio_id: g1_d_u1_settlement_subtitle_3
  text: 继续加油，多认识这些图形吧！
  role: announce
- audio_id: g1_d_u2_guide_title
  text: 准备破十过关！
  role: guide
- audio_id: g1_d_u2_settlement_subtitle
  text: 你已经掌握了破十法！
  role: announce
- audio_id: g1_d_u3_guide_title
  text: 拖动物品放入正确的位置，统计侦探出动啦！
  role: guide
- audio_id: g1_d_u3_guide_step2
  text: 统计侦探：看图回答问题！
  role: guide
- audio_id: g1_d_u3_guide_step2_sub
  text: 仔细看柱状图，哪根最高，哪根最低？
  role: guide
- audio_id: g1_d_u3_q_most
  text: 哪一类物品最多？
  role: guide
- audio_id: g1_d_u3_q_least
  text: 哪一类物品最少？
  role: guide
- audio_id: g1_d_u3_q_total
  text: 一共有多少种水果？
  role: guide
- audio_id: g1_d_u3_settlement_subtitle
  text: 你是统计小侦探！分类整理真有趣！
  role: announce
- audio_id: g1_d_u4_guide_title
  text: 欢迎来到数字阶梯！
  role: guide
- audio_id: g1_d_u4_settlement_subtitle
  text: 你已经认识了100以内的数！
  role: announce
- audio_id: g1_d_u5_guide_title
  text: 认识人民币，成为购物小达人！
  role: guide
- audio_id: g1_d_u5_q_1
  text: 1元等于多少角？
  role: guide
- audio_id: g1_d_u5_q_2
  text: 5角等于多少分？
  role: guide
- audio_id: g1_d_u5_q_3
  text: 2元等于多少角？
  role: guide
- audio_id: g1_d_u5_q_4
  text: 10角等于多少元？
  role: guide
- audio_id: g1_d_u5_q_5
  text: 30分等于多少角？
  role: guide
- audio_id: g1_d_u5_q_6
  text: 100分等于多少元？
  role: guide
- audio_id: g1_d_u5_settlement_subtitle
  text: 你已经认识了人民币，学会了简单购物！
  role: announce
- audio_id: g1_d_u6_guide_title
  text: 口算大冒险开始啦！
  role: guide
- audio_id: g1_d_u6_guide_step1
  text: 第一关：整十数加减！看看积木块，选答案吧！
  role: guide
- audio_id: g1_d_u6_guide_step2
  text: 第二关：挑战两位数加减！加油！
  role: guide
- audio_id: g1_d_u6_settlement_subtitle_1
  text: 全部正确，口算大冒险完美通关！
  role: announce
- audio_id: g1_d_u6_settlement_subtitle_2
  text: 表现不错，继续练习会更快！
  role: announce
- audio_id: g1_d_u6_settlement_subtitle_3
  text: 多练几遍，速度和准确率都会提升的！
  role: announce
- audio_id: g1_d_u7_guide_title
  text: 规律接龙——找出规律，接下去！
  role: guide
- audio_id: g1_d_u7_guide_step1
  text: 观察图形的排列规律，选出下一个！
  role: guide
- audio_id: g1_d_u7_guide_step2
  text: 观察数字的变化规律，填入缺失的数！
  role: guide
- audio_id: g1_d_u7_settlement_subtitle_1
  text: 太厉害了！你发现了所有规律！
  role: announce
- audio_id: g1_d_u7_settlement_subtitle_2
  text: 很棒！你掌握了大部分规律！
  role: announce
- audio_id: g1_d_u7_settlement_subtitle_3
  text: 继续加油，多练习就能找到规律啦！
  role: announce
g2:
- audio_id: g2_d_u2_divide_guide_init
  text: 准备分宝石！
  role: guide
- audio_id: g2_d_u2_divide_guide_step1
  text: 除法口算时间！看谁算得又快又准！
  role: guide
- audio_id: g2_d_u3_motion_guide_init
  text: 魔法门 — 对称判断
  role: guide
- audio_id: g2_d_u3_motion_settlement_subtitle
  text: 魔法门闯关完成！你已经学会了轴对称和图形运动！
  role: announce
- audio_id: g2_d_u4_divide2_settlement_subtitle
  text: 用口诀算商，分物不难！
  role: announce
- audio_id: g2_d_u6_remainder_settlement_subtitle
  text: 余数密码已破解！记住：余数永远比除数小！
  role: announce
- audio_id: g2_d_u7_big_nums_settlement_subtitle
  text: 你已经认识了万以内的数！
  role: announce
- audio_id: g2_d_u8_weight_error_1
  text: 再想想，答案仔细看看哦！
  role: guide
- audio_id: g2_d_u8_weight_settlement_subtitle
  text: 你学会了区分克和千克，还能在它们之间换算！称重小能手就是你！
  role: announce
- audio_id: g2_d_u9_logic_guide_step1
  text: 看看线索，用排除法找出正确的图形吧！
  role: guide
- audio_id: g2_d_u9_logic_guide_step2
  text: 根据线索猜数字，仔细想一想！
  role: guide
- audio_id: g2_d_u9_logic_error_1
  text: 不是这个哦，再看线索想想！
  role: guide
- audio_id: g2_d_u9_logic_error_2
  text: 不是这个数字哦，再看线索想想！
  role: guide
- audio_id: g2_u1_length_error_1
  text: 想一想，答案再仔细看看哦！
  role: guide
- audio_id: g2_u1_length_settlement_subtitle
  text: 你学会了用尺子测量长度，还能在厘米和米之间自由换算！
  role: announce
- audio_id: g2_u2_written_calc_guide_step1
  text: 第一关：竖式填空！找出缺少的数字！
  role: guide
- audio_id: g2_u2_written_calc_guide_step2
  text: 第二关：连加连减！算出最终答案！
  role: guide
- audio_id: g2_u3_angles_guide_init
  text: 角之猎人 — 第一关：认识角
  role: guide
- audio_id: g2_u3_angles_settlement_subtitle
  text: 角之猎人闯关完成！你已经学会了角的分类！
  role: announce
- audio_id: g2_u5_observe_error_1
  text: 看错啦，再仔细想想！
  role: guide
- audio_id: g2_u5_observe_error_2
  text: 不对哦，换个方向看看！
  role: guide
- audio_id: g2_u6_multiply79_settlement_subtitle
  text: 口诀射箭，百发百中！
  role: announce
- audio_id: g2_u7_time_hm_error_1
  text: 请输入时和分的数字！
  role: guide
- audio_id: g2_u7_time_hm_settlement_subtitle
  text: 你学会了看钟面、读时间和推算时间！
  role: announce
- audio_id: g2_u8_combo_guide_step1
  text: 点击一件上衣👕，再点击一条裤子👖，试试看有多少种搭配！
  role: guide
- audio_id: g2_u8_combo_guide_step2
  text: 用数字卡片组成两位数，每个数只能用一次哦！
  role: guide
g3:
- audio_id: g3_d_u1_direction_settlement_subtitle
  text: 你是方向小达人！上北下南左西右东，八个方向全掌握！🧭
  role: announce
- audio_id: g3_d_u2_divide_one_settlement_subtitle
  text: 除法小能手！两位数和三位数除法都难不倒你！➗
  role: announce
- audio_id: g3_d_u3_complex_table_settlement_subtitle
  text: 你是数据分析师！复式统计表看得又快又准！📊
  role: announce
- audio_id: g3_d_u4_multiply_2digit_settlement_subtitle
  text: 乘法高手！整十数和两位数乘法全掌握！✖️
  role: announce
- audio_id: g3_d_u5_area_settlement_subtitle
  text: 铺砖工程师！数格子和公式法算面积都难不倒你！📐
  role: announce
- audio_id: g3_d_u6_calendar_settlement_subtitle
  text: 日历小达人！年月日和24小时制全明白！📅
  role: announce
- audio_id: g3_d_u7_decimal_intro_settlement_subtitle
  text: 小数超市收银员！元角分和小数加减都会了！🛒
  role: announce
- audio_id: g3_d_u8_combo2_guide_step1
  text: 点击一件上衣👕，再点击一条下装👖，试试看有多少种搭配！
  role: guide
- audio_id: g3_u1_time_sec_settlement_subtitle
  text: 你学会了分和秒的换算，还能算出经过的时间！
  role: announce
- audio_id: g3_u2_addsub_large_settlement_subtitle
  text: 你掌握了两位数和几百几十的加减口算！
  role: announce
- audio_id: g3_u3_measurement_settlement_subtitle
  text: 你学会了毫米、厘米、分米、米、千米和吨、千克、克的换算！
  role: announce
- audio_id: g3_u4_addsub_large2_settlement_subtitle
  text: 你掌握了三位数加减法的竖式计算！
  role: announce
- audio_id: g3_u6_multiply_multi_settlement_subtitle
  text: 你掌握了多位数乘一位数的口算和竖式计算！
  role: announce
- audio_id: g3_u7_perimeter_settlement_subtitle
  text: 你学会了长方形和正方形周长的计算！
  role: announce
- audio_id: g3_u9_sets_settlement_subtitle
  text: 你掌握了集合重叠问题的解法！三年级上册全部通关！
  role: announce
g4:
- audio_id: g4_d_u1_four_ops_settlement_subtitle
  text: 你掌握了四则运算的运算顺序！
  role: announce
- audio_id: g4_d_u2_observe2_error_1
  text: 选错了，注意观察每个位置！
  role: guide
- audio_id: g4_d_u2_observe2_settlement_subtitle
  text: 你能从不同角度观察物体了！
  role: announce
- audio_id: g4_d_u3_laws_settlement_subtitle
  text: 你熟练掌握了运算定律！
  role: announce
- audio_id: g4_d_u4_decimal_meaning_settlement_subtitle
  text: 你完全掌握了小数的意义和性质！
  role: announce
- audio_id: g4_d_u5_triangle_settlement_subtitle
  text: 你掌握了三角形的分类和内角和！
  role: announce
- audio_id: g4_d_u6_decimal_addsub_settlement_subtitle
  text: 你能熟练进行小数加减运算了！
  role: announce
- audio_id: g4_d_u7_motion2_settlement_subtitle
  text: 你掌握了轴对称和平移的知识！
  role: announce
- audio_id: g4_d_u8_avg_bar_settlement_subtitle
  text: 你能分析数据、计算平均数了！
